name: Build and Release
on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        # Build on Windows, macOS, and Linux
        include:
          - os: ubuntu-latest
            script: build:linux
          - os: windows-latest
            script: build:win
          - os: macos-latest
            script: build:mac

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install

      - run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
  
  release:
    name: Create Github Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Generate changelog with contributors
        id: changelog
        run: |
          git fetch --prune --tags --force

          BASE=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$BASE" ]; then
            RANGE="HEAD"
          else
            RANGE="$BASE..HEAD"
          fi

          FEATURES=$(git log "$RANGE" --pretty=format:"- %s (%h)" | grep -i "feat" || true)
          FIXES=$(git log "$RANGE" --pretty=format:"- %s (%h)" | grep -i "fix" || true)
          CHORES=$(git log "$RANGE" --pretty=format:"- %s (%h)" | grep -i "chore" || true)
          OTHER=$(git log "$RANGE" --pretty=format:"- %s (%h)" | grep -vi "feat\|fix\|chore" || true)

          CONTRIBUTORS=$(git log --format='%aN' "$RANGE" \
            | grep -vE "dependabot|github-actions" \
            | sort -u \
            | paste -sd ", ")

          {
            echo "CHANGELOG<<EOF"

            echo "## 🚀 Features"
            echo "$FEATURES"

            echo ""
            echo "## 🐛 Fixes"
            echo "$FIXES"

            echo ""
            echo "## 🧹 Chores"
            echo "$CHORES"

            echo ""
            echo "## 📦 Other"
            echo "$OTHER"

            echo ""
            echo "## 👥 Contributors"
            echo "$CONTRIBUTORS"

            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "AI Study Buddy ${{ github.ref_name }}"
          body: |
            ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}