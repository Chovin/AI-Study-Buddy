name: Build and Release
on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        # Build on Windows, macOS, and Linux
        include:
					- os: ubuntu-latest
						args: --linux AppImage
					- os: windows-latest
						args: --win
					- os: macos-latest
						args: --mac

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - uses: samuelmeuli/action-electron-builder@v1
        with:
          args: ${{ matrix.args }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: true # Creates a draft release on GitHub