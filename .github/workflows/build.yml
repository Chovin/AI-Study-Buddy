name: Build and Release
on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        # Build on Windows, macOS, and Linux
        include:
          - os: ubuntu-latest
            script: build:linux
          - os: windows-latest
            script: build:win
          - os: macos-latest
            script: build:mac

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install

      - run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
  
  release:
    name: Create Github Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Generate changelog with contributors
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --prune --tags --force

          BASE=$(git tag --sort=-v:refname | sed -n '2p')
          LATEST=$(git tag --sort=-v:refname | head -n 1)

          # --- compare link ---
          REPO="https://github.com/${GITHUB_REPOSITORY}"
          COMPARE_URL="$REPO/compare/$BASE...$LATEST"

          if [ -z "$BASE" ]; then
            RANGE="HEAD"
          else
            RANGE="$BASE..$LATEST"
          fi

          # --- sort commits by prefix ---
          FEATURES=$(git log "$RANGE" --pretty=format:"- %s (%h)" | grep -i "feat" || true)
          FIXES=$(git log "$RANGE" --pretty=format:"- %s (%h)" | grep -i "fix" || true)
          CHORES=$(git log "$RANGE" --pretty=format:"- %s (%h)" | grep -i "chore" || true)
          OTHER=$(git log "$RANGE" --pretty=format:"- %s (%h)" | grep -vi "feat\|fix\|chore" || true)

          # --- resolve github usernames if possible ---
          CONTRIBUTORS=$(git log "$RANGE" --format='%aN|%aE' \
            | grep -vE "dependabot|github-actions" \
            | while IFS="|" read -r NAME EMAIL; do

                USER=""

                # 1. Handle noreply GitHub emails
                if [[ "$EMAIL" =~ @users\.noreply\.github\.com$ ]]; then

                  # Case A: 12345+Chovin@users...
                  USER=$(echo "$EMAIL" | sed -E 's/.*\+([^@]+)@.*/\1/')

                  # Case B: chovin@users...
                  if [[ "$USER" == *"@"* || -z "$USER" ]]; then
                    USER=$(echo "$EMAIL" | sed -E 's/([^@]+)@.*/\1/')
                  fi

                fi

                # 2. Fallback to API only if needed (optional but safe)
                if [ -z "$USER" ]; then
                  USER=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                    "https://api.github.com/search/users?q=$EMAIL+in:email" \
                    | grep -m 1 '"login":' \
                    | sed -E 's/.*"login": "([^"]+)".*/\1/')
                fi

                # 3. Final fallback
                if [ -z "$USER" ]; then
                  USER=$(echo "$NAME" | sed 's/^ *//;s/ *$//' | tr '[:upper:]' '[:lower:]')
                fi

                # Normalize key for dedupe (CRITICAL)
                KEY=$(echo "$USER" | tr '[:upper:]' '[:lower:]')

                echo "$KEY|$USER"

              done \
            | sort -u -t'|' -k1,1 \
            | cut -d'|' -f2 \
            | while read USER; do
                echo "[@$USER](https://github.com/$USER)"
              done \
            | awk '{printf "%s, ", $0}' \
            | sed 's/, $//')

          {
            echo "CHANGELOG<<EOF"

            echo "## 📦 Release Comparison"
            echo "[View changes between $BASE and $LATEST]($COMPARE_URL)"
            echo ""

            echo "## 🚀 Features"
            echo "$FEATURES"

            echo ""
            echo "## 🐛 Fixes"
            echo "$FIXES"

            echo ""
            echo "## 🧹 Chores"
            echo "$CHORES"

            echo ""
            echo "## 📦 Other"
            echo "$OTHER"

            echo ""
            echo "## 👥 Contributors"
            echo "$CONTRIBUTORS"

            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "AI Study Buddy ${{ github.ref_name }}"
          body: |
            ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}